<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Máy bán nước</title>

    <link rel="stylesheet" href="css/buy.css" />
  </head>

  <body>
    <!-- HEADER -->
    <div class="header">
      <h2 id="headerTitle">🥤 NƯỚC ÉP GIẢI PHÓNG</h2>

      <div class="search-box">
        <input id="searchInput" placeholder="Tìm máy..." autocomplete="off" />
        <div id="searchList" class="search-list"></div>
      </div>

      <button class="login-btn">Đăng nhập</button>
    </div>

    <!-- MAIN -->
    <div class="container">
      <!-- LEFT -->
      <div class="left">
        <h3>Chọn đồ uống...</h3>
        <div id="productList" class="products"></div>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <h3>🧾 Giỏ hàng</h3>

        <div id="cartList"></div>

        <div id="totalPrice" class="total">Tổng: 0đ</div>

        <div class="btns">
          <button onclick="clearCart()">Hủy</button>
          <button class="pay" onclick="checkout()">Tính tiền</button>
        </div>
      </div>
    </div>

    <script src="js/buy.js"></script>
  </body>
</html>
